# ==========================================
# LensPause · 息影 - 生产部署配置
# 从 GitHub Container Registry 拉取预构建镜像
# ==========================================
# 使用方式:
#   1. 服务器上登录 ghcr.io:
#      echo $GITHUB_PAT | docker login ghcr.io -u USERNAME --password-stdin
#   2. docker compose -f docker-compose.prod.yml pull
#   3. docker compose -f docker-compose.prod.yml up -d
# ==========================================

services:
  backend:
    image: ghcr.io/aaronlou/lenspause-backend:latest
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/lenspause.db
      - BASE_URL=https://lens.innergrow.ai
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - lenspause

  caddy:
    image: caddy:2-alpine
    # 不绑定主机 80/443，避免与服务器上其他 Web 应用冲突
    # 只暴露一个内部端口给全局反向代理使用
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/var/www/lenspause/index.html:ro
      - ./css:/var/www/lenspause/css:ro
      - ./js:/var/www/lenspause/js:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - lenspause

volumes:
  backend_data:
  caddy_data:
  caddy_config:

networks:
  lenspause:
    driver: bridge
