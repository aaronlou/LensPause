# ==========================================
# LensPause · 息影 - docker-compose
# 本地开发 & 生产部署通用
# ==========================================
# 使用方式:
#   1. 从 .env.example 创建 .env 并填入 UNSPLASH_CLIENT_ID
#   2. docker compose up -d
#   3. 本地开发访问 http://localhost:8080
#   4. 生产环境访问 https://your-domain.com
# ==========================================

services:
  # --- Rust 后端 API ---
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/lenspause.db
      - BASE_URL=http://localhost:3001
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- 前端（Nginx 静态文件 + API 反向代理）---
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # --- Caddy 边缘网关（可选，生产环境启用自动 HTTPS）---
  # 取消注释以下配置以启用 Caddy
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #     - "443:443/udp"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - frontend
  #     - backend
  #   restart: unless-stopped

volumes:
  backend_data:
  # caddy_data:
  # caddy_config:
