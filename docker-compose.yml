# ==========================================
# LensPause · 息影 - 本地开发配置
# 从源码构建 Rust 后端 + Caddy 边缘网关
# ==========================================
# 使用方式:
#   1. 从 .env.example 创建 .env 并填入 UNSPLASH_CLIENT_ID
#   2. docker compose up -d
#   3. 本地开发访问 http://localhost
#
# 生产部署请使用 docker-compose.prod.yml
# ==========================================

services:
  # --- Rust 后端 API ---
  backend:
    build: ./backend
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/lenspause.db
      - BASE_URL=http://localhost:3001
    volumes:
      - backend_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - lenspause

  # --- Caddy 边缘网关 ---
  # 职责：自动 HTTPS + 静态文件服务 + API 反向代理
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./index.html:/var/www/lenspause/index.html:ro
      - ./css:/var/www/lenspause/css:ro
      - ./js:/var/www/lenspause/js:ro
      - ./assets:/var/www/lenspause/assets:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    networks:
      - lenspause

volumes:
  backend_data:
  caddy_data:
  caddy_config:

networks:
  lenspause:
    driver: bridge
